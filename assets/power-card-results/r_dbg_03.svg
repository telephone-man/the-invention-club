<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" role="img" aria-labelledby="title desc">
  <title id="title">Use a fault checklist result build</title>
  <desc id="desc">A tactile workbench-style result image for Use a fault checklist.</desc>
  <defs>

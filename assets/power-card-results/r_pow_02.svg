<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" role="img" aria-labelledby="title desc">
  <title id="title">Power one load result build</title>
  <desc id="desc">A tactile workbench-style result image for Power one load.</desc>
  <defs>
    <linearGradient id="bench" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f4dfbd"/>
      <stop offset="1" stop-color="#d3a36c"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#f2e4cf"/>
